name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: ./node_modules/.bin/tsc --noEmit --pretty false

      - name: Runtime package build
        run: npm run build:runtime

      - name: Runtime package smoke
        run: |
          node --input-type=module <<'EOF'
          const runtime = await import("wendao-frontend/runtime");
          if (typeof runtime.createWendaoRuntime !== "function") {
            throw new Error("wendao-frontend/runtime did not export createWendaoRuntime");
          }
          EOF

      - name: Unit tests
        run: npm run test

      - name: TypeScript project harness
        run: npm run harness

      - name: Production build
        run: npm run build
