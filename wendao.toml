# Qianji Studio Configuration
#
# This is the user-facing configuration file for Qianji Studio.
# The frontend loads this file and mirrors project-scoped explorer config into Wendao Studio.

[gateway]
# Backend API bind address
bind = "127.0.0.1:9517"

[link_graph.projects.kernel]
root = "."
paths = ["docs", "internal_skills"]
watch_patterns = ["**/*.md", "**/*.markdown", "**/SKILL.md"]
include_dirs_auto = true
include_dirs_auto_candidates = ["docs", "internal_skills", "packages"]

[link_graph.projects.qianji_studio]
root = ".data/qianji-studio"
paths = ["docs", "internal_skills"]
watch_patterns = ["**/*.md", "**/*.markdown", "**/SKILL.md"]
include_dirs_auto = false
include_dirs_auto_candidates = []
