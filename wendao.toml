# Qianji Studio Configuration
#
# This is the user-facing configuration file for Qianji Studio.
# The frontend loads this file and mirrors project-scoped explorer config into Wendao Studio.

[gateway]
# Backend API bind address
bind = "127.0.0.1:9517"

[link_graph.projects.kernel]
root = "."
dirs = ["docs"]

[link_graph.projects.main]
root = "~/ghq/github.com/tao3k/omni-dev-fusion/"
dirs = ["docs", "internal_skills"]
