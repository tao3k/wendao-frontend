name: ZenSearch Performance CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zen-search-hotspot-perf:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PRJ_CACHE_HOME: ${{ github.workspace }}/.cache
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Reset hotspot perf artifact
        run: npm run test:hotspot-perf:reset

      - name: ZenSearch hotspot performance lane
        run: npm run test:hotspot-perf:zen-search

      - name: Upload ZenSearch hotspot perf trace artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zen-search-hotspot-perf-traces
          path: .cache/agent/tmp/wendao_frontend_hotspot_perf_traces.json
          if-no-files-found: warn
          retention-days: 14
